<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WDD231 course home page showcasing Web and Computer Programming certificate courses.">
    <meta name="author" content="Hermilio S. Mota">
    <title>WDD231 Home</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/larger.css">

    <!-- JavaScript -->
    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/date.js" defer></script>
    <script src="scripts/course.js" defer></script>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="logo">
            <img src="images/logo.svg" alt="Site Logo">
            <span>Hermilio S. Mota</span>
        </div>
        <button id="hamburger" aria-label="Menu">&#9776;</button>
    </header>

    <!-- Navigation -->
    <nav id="mainNav">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="chamber.html">Chamber</a></li>
            <li><a href="final.html">Final</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main>
        <h1>Home</h1>

        <section id="welcome">
            <h2>Welcome</h2>
            <p>Welcome to my WDD231 portfolio! Explore projects, courses, and updates.</p>
        </section>

        <section id="courses">
            <h2>Courses</h2>
            <div id="courseCards">
                <!-- Course cards generated by course.js -->
            </div>
            <div class="course-filter">
                <button id="allCourses">All Courses</button>
                <button id="wddCourses">WDD Courses</button>
                <button id="cseCourses">CSE Courses</button>
            </div>
            <p>Total Credits: <span id="totalCredits"></span></p>
        </section>

        <section id="about">
            <h2>About</h2>
            <p>About yourself, your goals, or course info.</p>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <div class="social-links">
            <a href="https://github.com/yourusername" target="_blank" aria-label="GitHub">GitHub</a>
            <a href="https://linkedin.com/in/yourusername" target="_blank" aria-label="LinkedIn">LinkedIn</a>
        </div>
        <div>
            &copy; <span id="currentYear"></span> Your Name, Your Country
        </div>
        <div>
            Last Modified: <span id="lastModified"></span>
        </div>
    </footer>
</body>
</html>
